<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adivina el número</title>
</head>
<body>

<h1>Adivina el número</h1>

<p>Intentos disponibles: <span id="intentos"></span></p>

<p>
    Límite inferior: <input type="number" id="li">
    Límite superior: <input type="number" id="ls">
    Intentos: <input type="number" id="n">
</p>

<button onclick="configurar()">Configurar</button>
<button onclick="iniciarJuego()">Iniciar juego</button>

<br><br>

<input type="number" id="numero">
<button onclick="intentar()">Adivinar</button>

<h2>Score</h2>
<p>Victorias: <span id="score"></span></p>
<p>Juegos: <span id="juegos"></span></p>

<script>

/* 
   GRUPO:
   Miguel Angel Condori
   Candy Camila Ordoñez Pinto
   Valery Dariana Ortuño Panozo 
*/

let puntajeTotal = Number(localStorage.getItem("puntajeTotal")) || 0;
let cantIntentos;
let numeroSecreto;
let enJuego = false;
let cantJuegos = Number(localStorage.getItem("cantJuegos")) || 0;
let limiteInferior = -1;
let limiteSuperior = -1;

actualizarPantalla();

function configurar(){
    let li = Number(document.getElementById("li").value);
    let ls = Number(document.getElementById("ls").value);
    let n = Number(document.getElementById("n").value);

    setUp(li, ls, n);
    actualizarPantalla();
}

function setUp(li,ls,n){
    limiteInferior = li;
    limiteSuperior = ls;
    cantIntentos = n;
}

function iniciarJuego(){
    if(limiteInferior == limiteSuperior && limiteInferior == -1){
        alert("Configura primero");
    }else{
        if(!enJuego){
            let numeroS = Math.random()*(limiteSuperior - limiteInferior)+limiteInferior;
            numeroSecreto = Math.round(numeroS);
            enJuego = true;
            cantJuegos++;
            actualizarPantalla();
        }else{
            alert("Ya estás jugando");
        }
    }
}

function intentar(){
    let numero = Number(document.getElementById("numero").value);
    adivinar(numero);
    actualizarPantalla();
}

function adivinar(numeroAdivinado){
    if(cantIntentos == 0){
        alert("Perdiste. El número era " + numeroSecreto);
        finalizarJuego();
    }else{
        cantIntentos--;
        if(numeroAdivinado == numeroSecreto){
            puntajeTotal++;
            alert("Ganaste!");
            finalizarJuego();
        }else if(numeroAdivinado > numeroSecreto){
            alert("Es menor. Intentos: " + cantIntentos);
        }else{
            alert("Es mayor. Intentos: " + cantIntentos);
        }
    }
}

function finalizarJuego(){
    enJuego = false;
    guardar();
}

function guardar(){
    localStorage.setItem("puntajeTotal", puntajeTotal);
    localStorage.setItem("cantJuegos", cantJuegos);
}

function actualizarPantalla(){
    document.getElementById("intentos").textContent = cantIntentos ?? 0;
    document.getElementById("score").textContent = puntajeTotal;
    document.getElementById("juegos").textContent = cantJuegos;
}

</script>

</body>
</html>
